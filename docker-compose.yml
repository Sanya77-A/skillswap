version: "3.8"
services:
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: skillswap

  server:
    build: ./server
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: mongodb://mongodb:27017/skillswap
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change-me-in-production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-in-production}
      CLIENT_URL: http://localhost
    depends_on:
      - mongodb

  client:
    build:
      context: ./client
      args:
        VITE_API_URL: /api
    ports:
      - "80:80"
    depends_on:
      - server

volumes:
  mongodb_data:
